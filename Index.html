<!DOCTYPE html>
    <html>
        <head>
            <link href="Style.css" rel="stylesheet" />
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width" />
            <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
            <script src="Script.js" defer></script>
            <title>To do list</title>
        </head>

        <body>
            <div class="app-container" id="taskList">
                <h1 class="app-header">To Do List</h1>
                <div class="add-task">
                    <input type="text" autocomplete="off" placeholder="Voeg taak toe" v-model="newTaskName"
                    @keyup.enter="newItem" class="task-input">
                    <input type="submit" value="" class="submit-task" @click="newItem" title="Voeg toe">
                </div>
                <ul class="task-list">
                    <li class="task-list-item" v-for="task in tasks">
                        <label class="task-list-item-label">
                            <input type="checkbox">
                            <span>{{ task.name }}</span>
                        </label>
                        <span @click="delItem(task)" class="delete-btn" title="Delete Task">{{ task.del }}</span>
                    </li>
                </ul>
            </div>
        </body>

    </html>
